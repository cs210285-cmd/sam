<div style="background:#f0ede8;padding:24px;border-radius:12px;">
<div style="max-width:560px;margin:0 auto;">

  <div style="background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:20px;margin-bottom:12px;text-align:center;">
    <div style="width:48px;height:48px;border-radius:50%;background:#eaf3de;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5L19 7" stroke="#3b6d11" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <p style="font-weight:500;font-size:16px;margin:0 0 4px;color:#2c2c2a;">申請已成功送出！</p>
    <p style="font-size:13px;color:#888780;margin:0;">我們收到您的資料，在正式派案前有個問題想請教您</p>
  </div>

  <div style="background:#fff;border:1px solid #d3d1c7;border-radius:10px;padding:20px;margin-bottom:12px;">
    <p style="font-weight:500;font-size:16px;margin:0 0 4px;color:#2c2c2a;">您是否需要「查定服務」？</p>
    <p style="font-size:13px;color:#888780;margin:0 0 16px;">查定服務可讓您在收購前確保底價，避免現場砍價</p>

    <div style="display:flex;gap:10px;margin-bottom:16px;">
      <div id="card-yes" style="flex:1;border:2px solid #378ADD;border-radius:10px;padding:14px;cursor:pointer;background:#e6f1fb;" onclick="selectCard('yes')">
        <p style="font-size:13px;font-weight:500;color:#0c447c;margin:0 0 4px;">需要查定</p>
        <p style="font-size:12px;color:#185fa5;margin:0;">保障收購價不被臨時壓低</p>
      </div>
      <div id="card-no" style="flex:1;border:1px solid #d3d1c7;border-radius:10px;padding:14px;cursor:pointer;background:#f1efe8;" onclick="selectCard('no')">
        <p style="font-size:13px;font-weight:500;color:#444441;margin:0 0 4px;">不需要查定</p>
        <p style="font-size:12px;color:#888780;margin:0;">直接派案比價，擇優成交</p>
      </div>
    </div>

    <div id="detail-yes" style="background:#e6f1fb;border:1px solid #85b7eb;border-radius:8px;padding:14px;margin-bottom:16px;">
      <p style="font-size:13px;font-weight:500;color:#0c447c;margin:0 0 8px;">查定服務說明</p>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#185fa5;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#185fa5;margin:0;">專業鑑定師到場或至門市完成車況認定</p>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#185fa5;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#185fa5;margin:0;">查定後簽訂書面承諾，確保收購價不再調整</p>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#185fa5;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#185fa5;margin:0;">查定完成後仍可選擇是否接受收購</p>
        </div>
      </div>
    </div>

    <div id="detail-no" style="background:#f1efe8;border:1px solid #d3d1c7;border-radius:8px;padding:14px;margin-bottom:16px;display:none;">
      <p style="font-size:13px;font-weight:500;color:#444441;margin:0 0 8px;">比價投標流程說明</p>
      <div style="display:flex;flex-direction:column;gap:7px;">
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#888780;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#5f5e5a;margin:0;">案件將派送給聯盟車商進行投標</p>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#888780;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#5f5e5a;margin:0;">系統於截標後通知您最高出價車商資訊</p>
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;">
          <div style="width:6px;height:6px;border-radius:50%;background:#888780;flex-shrink:0;margin-top:5px;"></div>
          <p style="font-size:12px;color:#5f5e5a;margin:0;">由您決定是否接受出價並安排勘車收購</p>
        </div>
      </div>
    </div>

    <button id="cta-btn" style="width:100%;height:46px;background:#185fa5;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:500;cursor:pointer;">確認，需要查定服務 →</button>
  </div>

</div>
</div>
<script>
function selectCard(choice) {
  var yes = document.getElementById('card-yes');
  var no = document.getElementById('card-no');
  var dYes = document.getElementById('detail-yes');
  var dNo = document.getElementById('detail-no');
  var btn = document.getElementById('cta-btn');
  if (choice === 'yes') {
    yes.style.border = '2px solid #378ADD';
    yes.style.background = '#e6f1fb';
    no.style.border = '1px solid #d3d1c7';
    no.style.background = '#f1efe8';
    dYes.style.display = 'block';
    dNo.style.display = 'none';
    btn.textContent = '確認，需要查定服務 →';
    btn.style.background = '#185fa5';
  } else {
    no.style.border = '2px solid #888780';
    no.style.background = '#d3d1c7';
    yes.style.border = '1px solid #d3d1c7';
    yes.style.background = '#f1efe8';
    dYes.style.display = 'none';
    dNo.style.display = 'block';
    btn.textContent = '確認，直接進行比價投標 →';
    btn.style.background = '#5f5e5a';
  }
}
</script>
