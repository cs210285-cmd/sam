<div style="max-width:600px;margin:0 auto;padding:1rem 0;">

  <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1rem 1.25rem;margin-bottom:1rem;">
    <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 4px;">頁面進度</p>
    <div style="display:flex;gap:6px;align-items:center;">
      <div style="height:4px;flex:1;background:var(--color-background-info);border-radius:2px;"></div>
      <div style="height:4px;flex:1;background:var(--color-background-info);border-radius:2px;"></div>
      <div style="height:4px;flex:1;background:var(--color-border-secondary);border-radius:2px;"></div>
    </div>
    <p style="font-size:11px;color:var(--color-text-secondary);margin:6px 0 0;">步驟 2/3　填寫預估收購價</p>
  </div>

  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;">

    <p style="font-weight:500;font-size:15px;margin:0 0 4px;color:var(--color-text-primary);">您的預估收購價</p>
    <p style="font-size:13px;color:var(--color-text-secondary);margin:0 0 12px;">請填寫您期望的收購金額（萬元）</p>

    <div style="background:var(--color-background-info);border:0.5px solid var(--color-border-info);border-radius:var(--border-radius-md);padding:12px 14px;margin-bottom:14px;display:flex;gap:12px;align-items:flex-start;">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--color-text-info);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><circle cx="7" cy="7" r="6" stroke="white" stroke-width="1.2"/><text x="7" y="11" text-anchor="middle" fill="white" font-size="9" font-weight="600">AI</text></svg>
      </div>
      <div>
        <p style="font-size:13px;font-weight:500;color:var(--color-text-info);margin:0 0 6px;">AI 估價參考結果</p>
        <p style="font-size:12px;color:var(--color-text-info);margin:0 0 8px;">依據您填寫的車籍資料與車況，AI 估算如下：</p>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;border:0.5px solid var(--color-border-info);">
            <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 2px;">車況一般</p>
            <p style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0;">88.3–90.2 萬</p>
          </div>
          <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;border:2px solid var(--color-border-info);">
            <p style="font-size:11px;color:var(--color-text-info);margin:0 0 2px;">車況良好 ✓</p>
            <p style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0;">90.6–92 萬</p>
          </div>
          <div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:8px 14px;text-align:center;border:0.5px solid var(--color-border-info);">
            <p style="font-size:11px;color:var(--color-text-secondary);margin:0 0 2px;">車況超優</p>
            <p style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin:0;">92.5–94.3 萬</p>
          </div>
        </div>
        <p style="font-size:11px;color:var(--color-text-secondary);margin:8px 0 0;">* 僅供參考，實際收購價以專人鑑價為準</p>
      </div>
    </div>

    <label style="font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px;">您的期望金額（萬元）<span style="color:var(--color-text-danger);">*</span></label>
    <div style="display:flex;align-items:center;gap:8px;">
      <input type="number" placeholder="請輸入金額" value="91" style="flex:1;font-size:16px;padding:0 12px;height:42px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);"/>
      <span style="font-size:14px;color:var(--color-text-secondary);white-space:nowrap;">萬元</span>
    </div>
    <p style="font-size:12px;color:var(--color-text-secondary);margin:6px 0 0;">AI 建議區間：90.6–92 萬（車況良好）</p>

  </div>

  <div style="background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1rem;">
    <label style="font-size:13px;color:var(--color-text-secondary);display:block;margin-bottom:6px;">備註（選填）</label>
    <textarea placeholder="如有特殊裝備、改裝或其他補充說明，可在此填寫" style="width:100%;height:72px;font-size:13px;padding:10px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);resize:none;box-sizing:border-box;"></textarea>
  </div>

  <label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--color-text-secondary);margin-bottom:16px;cursor:pointer;">
    <input type="checkbox" style="margin-top:2px;width:14px;height:14px;flex-shrink:0;"/>
    <span>我已閱讀並同意<span style="color:var(--color-text-info);text-decoration:underline;">隱私權政策</span>與<span style="color:var(--color-text-info);text-decoration:underline;">平台使用條款</span></span>
  </label>

  <button style="width:100%;height:46px;background:var(--color-text-info);color:#fff;border:none;border-radius:var(--border-radius-md);font-size:15px;font-weight:500;cursor:pointer;" onclick="sendPrompt('送出申請後會跳出查定服務詢問頁嗎？')">取得專屬收購價 →</button>

</div>
